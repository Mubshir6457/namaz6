<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Descent Book Centre | Inventory System</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --warning: #ff7675;
            --dark: #2d3436;
            --light: #f1f2f6;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #dfe6e9; 
            margin: 0; 
            padding: 10px; 
            color: var(--dark);
        }

        .container { 
            max-width: 100%; 
            margin: auto; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 1.6rem; 
            margin: 10px 0;
            text-transform: uppercase;
        }

        /* --- Add New Item Section --- */
        .add-item-box {
            background: var(--light); 
            padding: 15px; 
            border-radius: 12px;
            margin-bottom: 20px; 
            border: 2px solid var(--primary);
        }
        .form-row { display: flex; flex-direction: column; gap: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: var(--primary); }
        .form-group input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }

        /* --- Action Buttons --- */
        .actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .btn { 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            font-size: 0.9rem;
            text-align: center;
            transition: 0.2s;
        }
        .add-btn { background: var(--primary); width: 100%; margin-top: 10px; }
        .save-btn { background: var(--success); }
        .refresh-btn { background: #636e72; }
        .btn:active { transform: scale(0.98); }

        /* --- Data Display (Mobile Optimized) --- */
        .row-header { display: none; } /* Hidden on mobile */

        #inventory-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .data-row { 
            background: white; 
            border: 1px solid #eee; 
            border-radius: 12px;
            padding: 12px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .item-name { 
            grid-column: span 2; 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 1.05rem; 
            border-bottom: 1px solid #f1f1f1; 
            padding-bottom: 6px;
            margin-bottom: 4px;
        }
        
        .input-wrap { display: flex; flex-direction: column; gap: 4px; }
        .input-wrap label { font-size: 0.65rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .input-wrap input { 
            width: 85%; 
            padding: 10px 5px; 
            border-radius: 6px; 
            border: 1px solid #ddd; 
            font-weight: bold; 
            font-size: 1.1rem;
            text-align: center;
        }

        .status-wrap { 
            grid-column: span 2; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .avail-badge { 
            font-weight: 800; 
            font-size: 1.1rem; 
            padding: 4px 15px; 
            border-radius: 20px; 
            background: #ddd; 
        }

        .low-stock { background: var(--warning); color: white; }
        
        .cash-wrap { 
            grid-column: span 2; 
            background: #e8f8f5; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            font-weight: bold; 
            color: var(--success);
            font-size: 1rem;
            border: 1px solid #d1f2eb;
        }

        /* --- Tablet & Desktop View --- */
        @media (min-width: 768px) {
            .container { max-width: 900px; padding: 25px; }
            .form-row { flex-direction: row; align-items: flex-end; }
            .row-header { 
                display: grid; 
                grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr; 
                background: var(--primary); 
                color: white; 
                padding: 12px; 
                border-radius: 8px; 
                text-align: center; 
                margin-bottom: 10px;
                font-size: 0.9rem;
            }
            .data-row { 
                grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr; 
                border-left: none; 
                align-items: center; 
                text-align: center; 
                border-bottom: 1px solid #eee;
            }
            .item-name { grid-column: span 1; border: none; margin: 0; padding: 0; text-align: left; }
            .status-wrap { grid-column: span 1; background: none; justify-content: center; padding: 0; }
            .status-wrap label { display: none; }
            .cash-wrap { grid-column: span 1; background: none; border: none; padding: 0; }
            .input-wrap label { display: none; }
            .input-wrap input { width: 70%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Descent Book Centre</h1>
    
    <!-- Add New Item Section -->
    <div class="add-item-box">
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label>Item Name & Price (e.g. Register 200)</label>
                <input type="text" id="newName" placeholder="Item ka naam aur qeemat...">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Opening Stock</label>
                <input type="number" id="newQty" value="0">
            </div>
        </div>
        <button class="btn add-btn" onclick="addNewRow()">➕ Add New Item</button>
    </div>

    <!-- Sync & Save Buttons -->
    <div class="actions">
        <button class="btn refresh-btn" onclick="fetchData()">🔄 Sync Data</button>
        <button class="btn save-btn" onclick="saveData()">💾 Save All</button>
    </div>

    <!-- Desktop Header -->
    <div class="row-header">
        <div style="text-align: left; padding-left: 10px;">Item Name</div>
        <div>Stock In</div>
        <div>Sold</div>
        <div>Available</div>
        <div>Sold Cash</div>
    </div>
    
    <!-- Inventory List -->
    <div id="inventory-list">
        <!-- Data dynamically loads here -->
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxeLGiVjq9pcS2_ffIr_4_qfDOVlLJ6bjkSSaSZI4rtFy6u3U7tqOv07ebejhkgnawv/exec';

    // 1. Add New Item to List
    function addNewRow() {
        const name = document.getElementById('newName').value.trim();
        const qty = parseInt(document.getElementById('newQty').value) || 0;
        if(!name) return alert("Meharbani karke item ka naam likhen!");
        
        const list = document.getElementById('inventory-list');
        const price = parseInt(name.match(/\d+/) || 0); // Price name se nikalta hai
        
        list.insertAdjacentHTML('afterbegin', createRowHTML(name, qty, 0, qty, 0, price));
        
        // Reset Inputs
        document.getElementById('newName').value = '';
        document.getElementById('newQty').value = '0';
    }

    // 2. Generate Row HTML
    function createRowHTML(name, qty, sold, avail, value, price) {
        return `
            <div class="data-row">
                <div class="item-name">${name}</div>
                <div class="input-wrap">
                    <label>Stock In</label>
                    <input type="number" value="${qty}" oninput="updateRow(this, ${price})" class="qty-in">
                </div>
                <div class="input-wrap">
                    <label>Sold</label>
                    <input type="number" value="${sold}" oninput="updateRow(this, ${price})" class="sold-in">
                </div>
                <div class="status-wrap">
                    <label style="font-size:0.75rem; font-weight:bold; color:#666;">AVAILABLE:</label>
                    <div class="avail-badge ${avail < 5 ? 'low-stock' : ''}">${avail}</div>
                </div>
                <div class="cash-wrap">
                    CASH: Rs. <span class="val-text">${value}</span>
                </div>
            </div>
        `;
    }

    // 3. Fetch Data from Google Sheets
    async function fetchData() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = '<p style="text-align:center;">Loading data...</p>';
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            list.innerHTML = '';
            for (let i = 1; i < data.length; i++) {
                const [name, qty, sold, avail, value] = data[i];
                const price = parseInt(name.match(/\d+/) || 0);
                list.innerHTML += createRowHTML(name, qty, sold, avail, value, price);
            }
        } catch (e) { 
            list.innerHTML = '<p style="text-align:center; color:red;">Sync Error!</p>';
        }
    }

    // 4. Real-time Calculation
    function updateRow(input, price) {
        const row = input.closest('.data-row');
        const qty = parseInt(row.querySelector('.qty-in').value) || 0;
        const sold = parseInt(row.querySelector('.sold-in').value) || 0;
        
        const avail = qty - sold;
        const cash = sold * price;

        const badge = row.querySelector('.avail-badge');
        badge.innerText = avail;
        row.querySelector('.val-text').innerText = cash;

        // Stock Alert Color
        if(avail < 5) badge.classList.add('low-stock');
        else badge.classList.remove('low-stock');
    }

    // 5. Save Back to Google Sheets
    async function saveData() {
        const rows = document.querySelectorAll('.data-row');
        let dataToSave = [["Item Name", "Quantity", "Sold", "Available", "Value"]];
        
        rows.forEach(row => {
            dataToSave.push([
                row.querySelector('.item-name').innerText,
                parseInt(row.querySelector('.qty-in').value) || 0,
                parseInt(row.querySelector('.sold-in').value) || 0,
                parseInt(row.querySelector('.avail-badge').innerText) || 0,
                parseInt(row.querySelector('.val-text').innerText) || 0
            ]);
        });

        try {
            const saveBtn = document.querySelector('.save-btn');
            saveBtn.innerText = "Saving...";
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(dataToSave) 
            });
            alert("Success! Google Sheet update ho gayi hai.");
            saveBtn.innerText = "💾 Save All";
        } catch (e) { 
            alert("Nahi bach saka! Error aaya hai."); 
        }
    }

    window.onload = fetchData;
</script>

</body>
</html>
